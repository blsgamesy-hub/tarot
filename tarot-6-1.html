<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="타로">
<title>타로 카드</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Noto+Sans+KR:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0d0a14;--surface:#1a1428;--surface2:#231c35;
  --gold:#c9a84c;--gold-light:#e8c96a;--gold-dim:#7a6430;
  --text:#e8dfc8;--text-dim:#8a7a6a;
  --accent:#7c4daa;--accent2:#a06fd0;
}
body{
  min-height:100vh;background:var(--bg);color:var(--text);
  font-family:'Noto Sans KR',sans-serif;
  background-image:
    radial-gradient(ellipse at 20% 10%, rgba(124,77,170,0.15) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 90%, rgba(201,168,76,0.08) 0%, transparent 50%);
}
/* 별빛 배경 */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    radial-gradient(1px 1px at 15% 20%, rgba(255,255,255,0.6) 0%, transparent 100%),
    radial-gradient(1px 1px at 45% 8%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 70% 35%, rgba(255,255,255,0.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 90% 15%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 30% 75%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 80% 70%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 55% 55%, rgba(255,255,255,0.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 10% 50%, rgba(255,255,255,0.3) 0%, transparent 100%);
}

#app{position:relative;z-index:1;max-width:560px;margin:0 auto;padding:30px 20px 60px;}

/* 헤더 */
.app-title{
  font-family:'Cormorant Garamond',serif;font-size:38px;font-weight:600;
  text-align:center;color:var(--gold-light);letter-spacing:3px;
  margin-bottom:4px;
}
.app-sub{text-align:center;font-size:11px;color:var(--text-dim);letter-spacing:2px;margin-bottom:32px;}

/* 설정 카드 */
.settings-card{
  background:var(--surface);border:1px solid rgba(201,168,76,0.2);
  border-radius:16px;padding:24px;margin-bottom:24px;
}

/* 장수 선택 */
.count-label{font-size:11px;color:var(--gold-dim);letter-spacing:1px;margin-bottom:12px;}
.count-row{display:flex;gap:8px;margin-bottom:24px;}
.count-btn{
  flex:1;padding:10px 4px;border-radius:10px;border:1px solid rgba(201,168,76,0.25);
  background:transparent;color:var(--text-dim);font-size:15px;cursor:pointer;
  font-family:'Cormorant Garamond',serif;transition:all .2s;
}
.count-btn.sel{
  background:rgba(201,168,76,0.15);border-color:var(--gold);
  color:var(--gold-light);font-weight:600;
}

/* 옵션 체크 */
.options-row{display:flex;flex-direction:column;gap:10px;}
.option-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;border-radius:10px;background:var(--surface2);
  border:1px solid rgba(255,255,255,0.05);
}
.option-label{font-size:13px;color:var(--text);}
.option-desc{font-size:10px;color:var(--text-dim);margin-top:2px;}
.toggle{
  width:44px;height:24px;border-radius:12px;background:rgba(255,255,255,0.1);
  border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;
}
.toggle::after{
  content:'';position:absolute;top:3px;left:3px;
  width:18px;height:18px;border-radius:50%;background:#666;transition:all .2s;
}
.toggle.on{background:rgba(201,168,76,0.4);}
.toggle.on::after{left:23px;background:var(--gold-light);}
.toggle.disabled{opacity:0.4;cursor:not-allowed;}

/* 뽑기 버튼 */
.draw-btn{
  width:100%;padding:16px;border-radius:14px;border:1px solid var(--gold-dim);
  background:linear-gradient(135deg,rgba(124,77,170,0.4),rgba(201,168,76,0.2));
  color:var(--gold-light);font-family:'Cormorant Garamond',serif;
  font-size:20px;letter-spacing:2px;cursor:pointer;
  transition:all .25s;margin-bottom:28px;
}
.draw-btn:active{transform:scale(0.98);opacity:0.85;}

/* 결과 */
.result-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:16px;
}
.result-title{font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--gold);}
.copy-all-btn{
  padding:7px 14px;border-radius:20px;border:1px solid var(--gold-dim);
  background:transparent;color:var(--gold);font-size:12px;cursor:pointer;
  transition:all .2s;
}
.copy-all-btn:active{background:rgba(201,168,76,0.15);}

.cards-list{display:flex;flex-direction:column;gap:10px;}

.card-item{
  background:var(--surface);border:1px solid rgba(201,168,76,0.15);
  border-radius:12px;padding:14px 16px;cursor:pointer;
  transition:border-color .2s;
}
.card-item:active{border-color:var(--gold-dim);}
.card-pos{font-size:10px;color:var(--text-dim);letter-spacing:1px;margin-bottom:4px;}
.card-name-kr{font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--gold-light);margin-bottom:2px;}
.card-name-en{font-size:11px;color:var(--text-dim);}
.card-reversed{
  display:inline-block;font-size:10px;padding:2px 8px;border-radius:8px;
  background:rgba(160,111,208,0.2);color:var(--accent2);border:1px solid rgba(160,111,208,0.3);
  margin-left:8px;vertical-align:middle;
}
.card-suit{font-size:10px;color:var(--text-dim);margin-top:2px;}

/* 카드 상세 모달 */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:100;
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .3s;
}
.modal-overlay.show{opacity:1;pointer-events:all;}
.modal{
  background:var(--surface);border-radius:20px 20px 0 0;
  border:1px solid rgba(201,168,76,0.2);border-bottom:none;
  padding:28px 24px 40px;width:100%;max-width:560px;
  transform:translateY(100%);transition:transform .3s ease;
}
.modal-overlay.show .modal{transform:translateY(0);}
.modal-handle{width:36px;height:4px;background:rgba(255,255,255,0.15);border-radius:2px;margin:0 auto 20px;}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:28px;color:var(--gold-light);margin-bottom:4px;}
.modal-en{font-size:12px;color:var(--text-dim);margin-bottom:16px;}
.modal-meaning{font-size:13px;color:var(--text);line-height:1.8;padding:14px;background:var(--surface2);border-radius:10px;margin-bottom:16px;}
.modal-close{
  width:100%;padding:13px;border-radius:12px;
  border:1px solid rgba(201,168,76,0.2);background:transparent;
  color:var(--text-dim);font-size:14px;cursor:pointer;
}

/* 토스트 */
.toast{
  position:fixed;bottom:30px;left:50%;transform:translateX(-50%);
  background:var(--gold);color:#1a1200;padding:10px 22px;
  border-radius:20px;font-size:13px;font-weight:500;
  opacity:0;transition:opacity .3s;pointer-events:none;z-index:200;
  white-space:nowrap;
}
.toast.show{opacity:1;}

@keyframes cardIn{
  from{opacity:0;transform:translateY(12px);}
  to{opacity:1;transform:translateY(0);}
}
.card-item{animation:cardIn .3s ease both;}
</style>
</head>
<body>
<div id="app">
  <div class="app-title">✦ TAROT ✦</div>
  <div class="app-sub">카드를 뽑아보세요</div>

  <div class="settings-card">
    <div class="count-label">뽑을 장수</div>
    <div class="count-row" id="count-row"></div>

    <div class="count-label">덱 설정</div>
    <div class="options-row">
      <div class="option-item">
        <div>
          <div class="option-label">메이저 아르카나</div>
          <div class="option-desc">22장 · 큰 운명의 카드</div>
        </div>
        <button class="toggle on disabled" id="tog-major"></button>
      </div>
      <div class="option-item">
        <div>
          <div class="option-label">마이너 아르카나</div>
          <div class="option-desc">56장 · 일상의 카드</div>
        </div>
        <button class="toggle on" id="tog-minor" onclick="toggleOpt('minor')"></button>
      </div>
      <div class="option-item">
        <div>
          <div class="option-label">역방향</div>
          <div class="option-desc">뒤집힌 카드 포함</div>
        </div>
        <button class="toggle" id="tog-rev" onclick="toggleOpt('rev')"></button>
      </div>
    </div>
  </div>

  <button class="draw-btn" onclick="drawCards()">✦ 카드 뽑기 ✦</button>

  <div id="result"></div>
</div>

<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div id="modal-content"></div>
    <button class="modal-close" onclick="closeModalBtn()">닫기</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const MAJOR = [
  {num:0, en:"The Fool", kr:"바보", img:"https://upload.wikimedia.org/wikipedia/commons/9/90/RWS_Tarot_00_Fool.jpg", meaning:"새로운 시작과 순수한 모험의 에너지. 아무것도 모르기에 두려움도 없이 절벽 끝에서 발을 내딛는 순간. 과거의 짐을 내려놓고 미지의 세계로 뛰어드는 용기. 때로는 무모해 보이지만 그 자유로움이 새로운 가능성을 열어줍니다. 지금 당신 앞에 예상치 못한 기회나 전환점이 있을 수 있어요."},
  {num:1, en:"The Magician", kr:"마법사", img:"https://upload.wikimedia.org/wikipedia/commons/d/de/RWS_Tarot_01_Magician.jpg", meaning:"눈앞에 놓인 도구들을 완전히 활용할 능력이 있음을 나타냅니다. 의지와 집중력으로 원하는 현실을 창조하는 힘. 위로는 하늘을, 아래로는 땅을 연결하는 존재로서 아이디어를 행동으로 옮길 최적의 시기입니다. 당신에게 필요한 모든 것이 이미 갖춰져 있어요."},
  {num:2, en:"The High Priestess", kr:"여사제", img:"https://upload.wikimedia.org/wikipedia/commons/8/88/RWS_Tarot_02_High_Priestess.jpg", meaning:"드러나지 않은 진실과 깊은 직관의 카드. 지금은 행동보다 기다림과 내면의 목소리에 귀 기울여야 할 때. 표면 아래 숨겨진 것들이 있으며 시간이 지나면 드러날 것입니다. 논리보다 직감을 신뢰하세요."},
  {num:3, en:"The Empress", kr:"여황제", img:"https://upload.wikimedia.org/wikipedia/commons/d/d2/RWS_Tarot_03_Empress.jpg", meaning:"풍요롭고 창조적인 에너지가 넘치는 카드. 씨앗이 자라 꽃을 피우듯 당신의 노력이 결실을 맺는 시기. 자연의 풍요로움처럼 물질적, 감정적 풍족함이 찾아옵니다."},
  {num:4, en:"The Emperor", kr:"황제", img:"https://upload.wikimedia.org/wikipedia/commons/c/c3/RWS_Tarot_04_Emperor.jpg", meaning:"안정된 토대와 강한 리더십의 카드. 감정보다 이성과 구조로 상황을 다스리는 에너지. 체계와 규율이 필요한 시기이며 장기적 계획을 세우고 실행할 힘이 있습니다."},
  {num:5, en:"The Hierophant", kr:"교황", img:"https://upload.wikimedia.org/wikipedia/commons/8/8d/RWS_Tarot_05_Hierophant.jpg", meaning:"전통, 관습, 영적 안내의 카드. 기존의 틀 안에서 지혜를 찾거나 믿을 수 있는 스승과 가르침을 만나는 시기. 혼자 고민하기보다 검증된 방법이나 전문가의 조언을 구하는 것이 도움이 됩니다."},
  {num:6, en:"The Lovers", kr:"연인", img:"https://upload.wikimedia.org/wikipedia/commons/d/db/RWS_Tarot_06_Lovers.jpg", meaning:"사랑과 깊은 선택의 카드. 단순히 로맨스만이 아닌, 가치관과 정체성에 관한 중요한 기로에 서 있음을 의미합니다. 진정으로 원하는 것을 선택할 용기가 필요한 시기."},
  {num:7, en:"The Chariot", kr:"전차", img:"https://upload.wikimedia.org/wikipedia/commons/9/9b/RWS_Tarot_07_Chariot.jpg", meaning:"강한 의지와 통제력으로 앞으로 나아가는 카드. 서로 다른 힘들을 하나로 모아 목표를 향해 돌진합니다. 지금은 포기할 때가 아니라 더욱 집중하고 밀어붙일 때."},
  {num:8, en:"Strength", kr:"힘", img:"https://upload.wikimedia.org/wikipedia/commons/f/f5/RWS_Tarot_08_Strength.jpg", meaning:"두려움이나 분노를 억압하지 않고 부드러운 사랑으로 다스리는 진정한 강함의 카드. 내면의 본능적 에너지를 지혜롭게 다루는 시기. 자기 자신에 대한 깊은 이해와 인내심이 어떤 상황도 극복하게 해줄 것입니다."},
  {num:9, en:"The Hermit", kr:"은둔자", img:"https://upload.wikimedia.org/wikipedia/commons/4/4d/RWS_Tarot_09_Hermit.jpg", meaning:"혼자만의 시간과 내면 탐구가 필요한 시기. 타인의 시선이나 외부의 소음에서 벗어나 자신만의 등불을 들고 걷는 고독한 여정. 답은 이미 내 안에 있으며, 조용히 귀 기울이면 들려옵니다."},
  {num:10, en:"Wheel of Fortune", kr:"운명의 수레바퀴", img:"https://upload.wikimedia.org/wikipedia/commons/3/3c/RWS_Tarot_10_Wheel_of_Fortune.jpg", meaning:"예상치 못한 변화와 운명적 전환점의 카드. 수레바퀴는 계속 돌아가며 올라가는 자와 내려가는 자가 있습니다. 좋은 흐름이라면 최대한 활용하고, 힘든 시기라면 이 또한 지나갈 것임을 기억하세요."},
  {num:11, en:"Justice", kr:"정의", img:"https://upload.wikimedia.org/wikipedia/commons/e/e0/RWS_Tarot_11_Justice.jpg", meaning:"공정하고 균형 잡힌 판단의 카드. 원인이 있으면 반드시 결과가 있다는 인과의 법칙. 지금 상황을 감정이 아닌 냉정한 시각으로 바라볼 필요가 있습니다."},
  {num:12, en:"The Hanged Man", kr:"매달린 사람", img:"https://upload.wikimedia.org/wikipedia/commons/2/2b/RWS_Tarot_12_Hanged_Man.jpg", meaning:"자발적인 정지와 새로운 시각의 카드. 잠시 멈추고 다른 관점으로 상황을 바라볼 때 전혀 다른 진실이 보입니다. 지금 당장 행동하기보다 기다리고 수용하는 것이 더 큰 지혜일 수 있어요."},
  {num:13, en:"Death", kr:"죽음", img:"https://upload.wikimedia.org/wikipedia/commons/d/d7/RWS_Tarot_13_Death.jpg", meaning:"끝과 새로운 시작의 카드. 물리적 죽음이 아닌 낡은 것의 소멸과 변환을 의미합니다. 더 이상 필요하지 않은 것을 놓아주어야 새것이 들어올 수 있어요."},
  {num:14, en:"Temperance", kr:"절제", img:"https://upload.wikimedia.org/wikipedia/commons/f/f8/RWS_Tarot_14_Temperance.jpg", meaning:"균형과 조화, 인내의 카드. 서두르지 않고 섬세하게 흐름을 조율하는 에너지. 극단으로 치닫지 않고 중용을 지키는 것이 지금 가장 필요한 지혜."},
  {num:15, en:"The Devil", kr:"악마", img:"https://upload.wikimedia.org/wikipedia/commons/5/55/RWS_Tarot_15_Devil.jpg", meaning:"속박과 집착, 그림자 자아의 카드. 두려움, 중독, 집착이 당신을 가두고 있지는 않나요? 나를 힘들게 하는 것이 사실 내가 허용하고 있는 것일 수 있어요. 인식하는 순간 해방의 가능성이 열립니다."},
  {num:16, en:"The Tower", kr:"탑", img:"https://upload.wikimedia.org/wikipedia/commons/5/53/RWS_Tarot_16_Tower.jpg", meaning:"갑작스러운 붕괴와 계시의 카드. 예상치 못한 충격이 올 수 있어요. 하지만 거짓된 토대 위에 세워진 것들이 무너지는 필요한 과정. 무너진 자리에 더 단단한 것을 세울 수 있어요."},
  {num:17, en:"The Star", kr:"별", img:"https://upload.wikimedia.org/wikipedia/commons/d/db/RWS_Tarot_17_Star.jpg", meaning:"희망과 치유, 영감의 카드. 어두운 밤하늘에 빛나는 별처럼 힘든 시기 이후 찾아오는 평화와 재생. 우주가 당신을 돕고 있으며 치유의 에너지가 흐르고 있어요."},
  {num:18, en:"The Moon", kr:"달", img:"https://upload.wikimedia.org/wikipedia/commons/7/7f/RWS_Tarot_18_Moon.jpg", meaning:"환상과 무의식, 불확실성의 카드. 지금 상황이 명확하지 않거나 두려움과 불안이 커지는 시기. 보이는 것이 전부가 아닐 수 있어요. 직관을 믿되 환상과 현실을 구분하는 노력이 필요합니다."},
  {num:19, en:"The Sun", kr:"태양", img:"https://upload.wikimedia.org/wikipedia/commons/1/17/RWS_Tarot_19_Sun.jpg", meaning:"기쁨과 성공, 밝은 에너지의 카드. 노력한 것들이 빛을 발하고 좋은 결과가 찾아옵니다. 자신감을 갖고 나를 드러내도 좋아요. 긍정적인 에너지가 주변까지 밝게 물들이는 최고의 카드 중 하나입니다."},
  {num:20, en:"Judgement", kr:"심판", img:"https://upload.wikimedia.org/wikipedia/commons/d/dd/RWS_Tarot_20_Judgement.jpg", meaning:"각성과 갱신, 소명의 카드. 잠들어 있던 자아가 깨어나는 시기. 과거의 선택들을 솔직하게 돌아보고 용서와 화해를 통해 새로운 나로 거듭나는 과정."},
  {num:21, en:"The World", kr:"세계", img:"https://upload.wikimedia.org/wikipedia/commons/f/ff/RWS_Tarot_21_World.jpg", meaning:"완성과 통합, 충만함의 카드. 하나의 긴 여정이 아름답게 완결되는 순간. 모든 경험이 통합되어 더 온전한 존재가 되었어요. 지금 이 순간을 충분히 누리고 감사하세요."},
];
const SUIT_SVG = {
  "완드": `<svg width="60" height="80" viewBox="0 0 60 80"><line x1="30" y1="10" x2="30" y2="70" stroke="#c9a84c" stroke-width="4" stroke-linecap="round"/><line x1="30" y1="25" x2="15" y2="40" stroke="#c9a84c" stroke-width="3" stroke-linecap="round"/><line x1="30" y1="25" x2="45" y2="40" stroke="#c9a84c" stroke-width="3" stroke-linecap="round"/><circle cx="30" cy="10" r="5" fill="#c9a84c"/></svg>`,
  "컵": `<svg width="60" height="80" viewBox="0 0 60 80"><path d="M18,20 L42,20 L38,50 Q30,58 22,50 Z" fill="none" stroke="#c9a84c" stroke-width="3"/><line x1="30" y1="50" x2="30" y2="62" stroke="#c9a84c" stroke-width="3"/><line x1="18" y1="62" x2="42" y2="62" stroke="#c9a84c" stroke-width="3" stroke-linecap="round"/></svg>`,
  "소드": `<svg width="60" height="80" viewBox="0 0 60 80"><line x1="30" y1="8" x2="30" y2="65" stroke="#c9a84c" stroke-width="3.5" stroke-linecap="round"/><line x1="16" y1="38" x2="44" y2="38" stroke="#c9a84c" stroke-width="3" stroke-linecap="round"/><polygon points="30,8 26,20 34,20" fill="#c9a84c"/></svg>`,
  "펜타클": `<svg width="60" height="80" viewBox="0 0 60 80"><polygon points="30,12 35,27 51,27 38,36 43,51 30,42 17,51 22,36 9,27 25,27" fill="none" stroke="#c9a84c" stroke-width="2.5" stroke-linejoin="round"/></svg>`,
};
const SUITS = [
  {name:"완드", meaning:"열정과 창조, 행동과 영감의 불꽃 에너지. 완드 수트는 야망, 의지, 창의적 도전을 다룹니다."},
  {name:"컵", meaning:"감정과 관계, 직관과 꿈의 물 에너지. 컵 수트는 사랑, 감정적 경험, 내면의 풍요를 다룹니다."},
  {name:"소드", meaning:"생각과 소통, 갈등과 진실의 바람 에너지. 소드 수트는 지성, 결단, 어려운 진실을 다룹니다."},
  {name:"펜타클", meaning:"물질과 현실, 재물과 안정의 땅 에너지. 펜타클 수트는 실용적인 문제, 재정, 몸과 건강을 다룹니다."},
];
const NUMBER_KEYS = ["에이스","2","3","4","5","6","7","8","9","10","페이지","나이트","퀸","킹"];
const NUMBER_MEANINGS = {
  "에이스":"순수한 씨앗 에너지. 새로운 시작과 가능성의 첫 번째 불꽃.",
  "2":"균형과 선택. 두 가지 사이에서 조율하거나 기다리는 에너지.",
  "3":"초기 성장과 협력. 창조적 표현과 함께하는 에너지.",
  "4":"안정과 휴식. 지금까지의 성과를 다지고 쉬어가는 단계.",
  "5":"갈등과 도전. 불안정함 속에서 배움을 얻는 시기.",
  "6":"조화와 나눔. 균형을 찾고 도움을 주고받는 에너지.",
  "7":"성찰과 전략. 표면 너머를 보고 깊이 생각해야 할 시기.",
  "8":"움직임과 진전. 집중력과 기술로 빠르게 나아가는 에너지.",
  "9":"완성에 가까운 단계. 마지막 고비를 넘기는 인내의 시기.",
  "10":"완성과 마무리. 하나의 사이클이 끝나고 새것이 시작되는 전환.",
  "페이지":"배움과 호기심. 새로운 분야를 탐색하는 젊은 에너지.",
  "나이트":"행동과 추진력. 목표를 향해 돌진하는 역동적인 에너지.",
  "퀸":"성숙하고 내면화된 지혜. 수트의 에너지를 깊이 이해하는 힘.",
  "킹":"마스터한 권위. 수트의 에너지를 완전히 통달한 리더십.",
};
const SUIT_EN = {"완드":"Wands","컵":"Cups","소드":"Swords","펜타클":"Pents"};
// Wikimedia 실제 URL 매핑 (검색결과에서 확인된 패턴)
const MINOR_IMGS = {
  "Wands":["1/11","0/0f","f/ff","a/a4","9/9d","3/3b","e/e4","6/6b","4/4d_Nine","0/0b","6/6a","1/16","0/0d","c/ce"],
  "Cups": ["3/36","f/f8","7/7a","3/35","d/d7","1/17","a/ae","6/60","2/24","8/84","a/ad","f/fa","6/62","0/04"],
  "Swords":["1/1a","9/9e","0/02","b/bf","2/23","2/29","3/34","a/a7","2/2f","d/d4","4/4c","b/b0","d/d4","3/33"],
  "Pents":["f/fd","9/9f","4/42","3/35","9/96","a/a6","6/6a","4/49","f/f0","4/42","e/ec","d/d5","8/88","1/1c"],
};
const MINOR = [];
SUITS.forEach(s=>{
  const suitEn = SUIT_EN[s.name];
  const hashes = MINOR_IMGS[suitEn];
  NUMBER_KEYS.forEach((n,i)=>{
    const num = String(i+1).padStart(2,'0');
    const hash = hashes ? hashes[i] : null;
    // 일부 파일명이 다른 경우 처리 (예: Tarot_Nine_of_Wands)
    let img = null;
    if(hash) {
      if(hash.endsWith('_Nine')) {
        img = `https://upload.wikimedia.org/wikipedia/commons/4/4d/Tarot_Nine_of_Wands.jpg`;
      } else {
        img = `https://upload.wikimedia.org/wikipedia/commons/${hash}/${suitEn}${num}.jpg`;
      }
    }
    MINOR.push({
      en:`${s.name} ${n}`, kr:`${s.name} ${n}`,
      meaning:`${s.meaning}\n\n${NUMBER_MEANINGS[n]}`,
      suit:s.name, img:img
    });
  });
});

let count = 3;
let opts = {major:true, minor:true, rev:false};
let drawn = [];

// 장수 버튼
const countRow = document.getElementById('count-row');
[1,2,3,4,5].forEach(n=>{
  const btn = document.createElement('button');
  btn.className = 'count-btn' + (n===3?' sel':'');
  btn.textContent = n;
  btn.onclick = ()=>{
    count=n;
    document.querySelectorAll('.count-btn').forEach(b=>b.classList.remove('sel'));
    btn.classList.add('sel');
  };
  countRow.appendChild(btn);
});

function toggleOpt(key){
  if(key==='major') return; // 비활성
  opts[key]=!opts[key];
  const tog=document.getElementById('tog-'+key);
  tog.classList.toggle('on', opts[key]);
}

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function drawCards(){
  let deck=[];
  if(opts.major) deck=[...MAJOR.map(c=>({...c,isMajor:true}))];
  if(opts.minor) deck=[...deck,...MINOR.map(c=>({...c,isMajor:false}))];
  if(deck.length===0){showToast('덱을 선택해주세요');return;}

  const shuffled=shuffle(deck);
  drawn=shuffled.slice(0,Math.min(count,shuffled.length)).map(c=>({
    ...c,
    reversed: opts.rev ? Math.random()<0.5 : false
  }));
  renderResult();
}

const positions1 = ["현재"];
const positions2 = ["과거","현재"];
const positions3 = ["과거","현재","미래"];
const positions4 = ["상황","도전","조언","결과"];
const positions5 = ["과거","현재","숨겨진것","조언","결과"];
const POSITIONS = [positions1,positions2,positions3,positions4,positions5];

function renderResult(){
  const pos = POSITIONS[drawn.length-1];
  let html = `<div class="result-header">
    <div class="result-title">✦ 결과</div>
    <button class="copy-all-btn" onclick="copyAll()">전체 복사</button>
  </div><div class="cards-list">`;

  drawn.forEach((c,i)=>{
    html+=`<div class="card-item" style="animation-delay:${i*0.08}s" onclick="showModal(${i})">
      <div class="card-pos">${pos[i]||`카드 ${i+1}`}</div>
      <div>
        <span class="card-name-kr">${c.kr}</span>
        ${c.reversed?'<span class="card-reversed">역방향</span>':''}
      </div>
      <div class="card-name-en">${c.en}${c.isMajor?' · 메이저':''}</div>
    </div>`;
  });
  html+='</div>';
  document.getElementById('result').innerHTML=html;
}

function copyAll(){
  const text=drawn.map(c=>`${c.kr}${c.reversed?' (역방향)':''}`).join('\n');
  try {
    const ta=document.createElement('textarea');
    ta.value=text;ta.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:80%;padding:12px;border-radius:10px;background:#1a1428;color:#e8c96a;border:1px solid #c9a84c;font-size:14px;z-index:9999;';
    ta.rows=drawn.length+1;
    document.body.appendChild(ta);
    ta.focus();ta.select();
    try{ document.execCommand('copy'); showToast('복사됐어요 ✓'); }
    catch(e){ showToast('길게 눌러서 복사하세요'); }
    setTimeout(()=>document.body.removeChild(ta), 3000);
  } catch(e){ showToast('복사 실패 😢'); }
}

function showModal(i){
  const c=drawn[i];
  const pos=POSITIONS[drawn.length-1];
  const imgHtml = (c.img)
    ? `<img src="${c.img}" alt="${c.kr}" style="width:120px;border-radius:8px;display:block;margin:0 auto 16px;box-shadow:0 4px 20px rgba(0,0,0,0.5);" onerror="this.style.display='none';this.nextSibling.style.display='block'"><div style="display:none;text-align:center;margin-bottom:12px;opacity:0.7">${SUIT_SVG[c.suit]||''}</div>`
    : c.suit ? `<div style="text-align:center;margin-bottom:12px;opacity:0.7">${SUIT_SVG[c.suit]||''}</div>` : '';
  document.getElementById('modal-content').innerHTML=`
    <div class="card-pos" style="margin-bottom:8px">${pos[i]||'카드'+(i+1)}</div>
    <div class="modal-title">${c.kr}${c.reversed?' <span style="font-size:16px;color:var(--accent2)">역방향</span>':''}</div>
    <div class="modal-en">${c.en}${c.isMajor?' · 메이저 아르카나':' · 마이너 아르카나'}</div>
    ${imgHtml}
    <div class="modal-meaning">${c.meaning.replace(/\n/g,'<br>')}${c.reversed?'<br><br><span style="color:var(--accent2)">역방향:</span> 에너지가 내면으로 향하거나 지연, 저항의 형태로 나타날 수 있어요.':''}</div>`;
  document.getElementById('modal').classList.add('show');
}

function closeModal(e){
  if(e.target===document.getElementById('modal')) closeModalBtn();
}
function closeModalBtn(){
  document.getElementById('modal').classList.remove('show');
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}
</script>
</body>
</html>
